<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wikipanime - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
    <div class="glass-container">
        <h2>Login</h2>
        <form action="/login" method="post">
            <div class="input-group">
                <input type="text" name="username" id="username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <input type="password" name="password" id="password" placeholder="Password" required>
            </div>
            <input type="submit" value="Login" class="btn-submit">
            <div style="background-color: rgba(255, 193, 7, 0.15); border-left: 4px solid #ffc107; padding: 12px; margin-top: 20px; border-radius: 5px; color: #ffd54f; font-size: 14px; text-align: left; display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 18px;">⚠️</span>
                <span><strong>Security Warning:</strong> Try not to fail the login session. Multiple failed attempts may trigger security protocols.</span>
            </div>
        </form>
        <div class="links">
            <a href="/">⬅ Back To Menu</a>
            <a href="/register">Doesn't have an account ?</a>
        </div>
    </div>
</body>
</html>
