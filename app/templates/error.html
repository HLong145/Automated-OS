<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Wikipanime</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/error.css') }}">
</head>
<body>
    <div id="troll-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center;">
        <video id="troll-video" style="border-radius: 20px; max-width: 80%;">
            <source src="{{ url_for('static', filename='videos/nihahahaha.mp4') }}" type="video/mp4">
        </video>
    </div>

    <div id="troll-modalv2" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center;">
        <video id="troll-videov2" style="border-radius: 20px; max-width: 80%;">
            <source src="{{ url_for('static', filename='videos/bleeeee.mp4') }}" type="video/mp4">
        </video>
    </div>

    <div id="brute-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;">
        <img src="{{ url_for('static', filename='images/brute_warning.jpg') }}" style="border-radius: 15px; max-width: 80%;">
        <button onclick="document.getElementById('brute-modal').style.display='none'" style="margin-top: 20px; padding: 10px 25px; font-size: 16px; border-radius: 8px; cursor: pointer; background: #ff4757; color: white; border: none; font-weight: bold;">I'm sorry...</button>
    </div>

    <div class="glass-container error-box">
        <h2>Error</h2>
        <p>{{ error_message }}</p>
        
        <div class="btn-group">
            <button onclick="history.back()" class="btn-error">Try again</button>
            <a href="{{ url_for('home') }}" class="btn-home">Back To Menu</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            let failCount = sessionStorage.getItem('loginFailCount') || 0;
            failCount = parseInt(failCount) + 1;
            sessionStorage.setItem('loginFailCount', failCount);

            let videoModal = document.getElementById('troll-modal');
            let videoModalv2 = document.getElementById('troll-modalv2');
            let video = document.getElementById('troll-video');
            let videov2 = document.getElementById('troll-videov2');
            let bruteModal = document.getElementById('brute-modal');

            if (failCount >= 4) {
                bruteModal.style.display = 'flex';
            } else if (failCount === 1) {
                videoModalv2.style.display = 'flex';
                videov2.play();
            } else {
                videoModal.style.display ='flex';
                video.play();
            }
            
            video.onended = function() {
                videoModal.style.display = 'none';
            };

            videoModal.onclick = function() {
                videoModal.style.display = 'none';
                video.pause();
            };

            videov2.onended = function() {
                videoModalv2.style.display = 'none';
            };

            videoModalv2.onclick = function() {
                videoModalv2.style.display = 'none';
                videov2.pause();
            };
        });
    </script>
</body>
</html>
